name: Build Mod

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Build with Gradle
      run: gradle build
    
    - name: Upload JAR as artifact
      uses: actions/upload-artifact@v4
      with:
        name: friendmod-jar
        path: build/libs/friendmod-*.jar
